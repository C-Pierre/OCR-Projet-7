services:

  back:
    build:
      context: ./back
    container_name: microcrm-back
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - microcrm-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 5

  front:
    build:
      context: ./front
    container_name: microcrm-front
    restart: unless-stopped
    ports:
      - "8081:80"
      - "443:443"
    depends_on:
      - back
    networks:
      - microcrm-net

networks:
  microcrm-net:
