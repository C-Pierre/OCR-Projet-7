name: CI Pipeline

on:
  push:
  pull_request:

jobs:
  # JOB 1 — Back-end (Gradle + Tests + Docker + Trivy + Sonar)
  backend:
    name: Back-end — Build, Test, Docker & Sonar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mise en cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('back/**/*.gradle*', 'back/**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Build & Tests back-end
        working-directory: ./back
        run: ./gradlew build --no-daemon

      - name: Publier les résultats de tests JUnit
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: back/build/reports/tests/test/

      - name: Analyse SonarQube — Back-end
        working-directory: ./back
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./gradlew sonar --no-daemon \
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY_BACK }} \
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.coverage.jacoco.xmlReportPaths=build/reports/jacoco/test/jacocoTestReport.xml

  # JOB 2 — Front-end (npm + Tests + Docker + Trivy + Sonar)
  frontend:
    name: Front-end — Build, Test, Docker & Sonar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mise en cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('front/package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Installation des dépendances
        working-directory: ./front
        run: npm ci

      - name: Tests Angular (Jest / Karma headless)
        working-directory: ./front
        run: npm test -- --watch=false --browsers=ChromeHeadless --code-coverage

      - name: Publier les résultats de tests front
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-test-results
          path: front/coverage/

      - name: Build Angular production
        working-directory: ./front
        run: npm run build -- --configuration production

      - name: Analyse SonarQube — Front-end
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: ./front
          args: -Dsonar.working.directory=.scannerwork
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  # JOB 3 — Build Docker (pour main/develop, optional)
  docker-build:
    name: Build & Scan images Docker
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set safe Docker variables
        run: |
          SAFE_OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          SAFE_BRANCH="${BRANCH//\//-}"
          echo "SAFE_OWNER=$SAFE_OWNER" >> $GITHUB_ENV
          echo "SAFE_BRANCH=$SAFE_BRANCH" >> $GITHUB_ENV
          
          echo "Repository owner: $SAFE_OWNER"
          echo "Branch: $SAFE_BRANCH"
          echo "Full SHA: ${{ github.sha }}"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Back image
        id: meta-back
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.SAFE_OWNER }}/${{ env.IMAGE_REPO }}/back
          tags: |
            type=raw,value=${{ env.SAFE_BRANCH }}-${{ github.sha }}

      - name: Build image back
        uses: docker/build-push-action@v6
        with:
          context: ./back
          push: false
          tags: projet_7-back:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build image front
        uses: docker/build-push-action@v6
        with:
          context: ./front
          push: false
          tags: projet_7-front:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Docker image back
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: projet_7-back:${{ github.sha }}
          severity: CRITICAL
          exit-code: 1

      - name: Scan Docker image front
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: projet_7-front:${{ github.sha }}
          severity: CRITICAL
          exit-code: 1
