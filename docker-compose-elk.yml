# ============================================================
#  Stack ELK — Usage local uniquement (dev)
#  Démarrage : docker compose -f docker-compose-elk.yml up -d
# ============================================================

services:

  # ELASTICSEARCH
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ELK_VERSION}
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms${ES_HEAP} -Xmx${ES_HEAP}
      - cluster.name=projet7-cluster
      - cluster.routing.allocation.disk.threshold_enabled=false
    volumes:
      - es-data:/usr/share/elasticsearch/data
    ports:
      - "${ES_PORT}:${ES_PORT}"
    networks:
      - elk
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://${LOGSTASH_HOST}:${ES_PORT}/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
    mem_limit: ${ES_MEM_LIMIT}
    restart: unless-stopped

  # LOGSTASH
  logstash:
    image: docker.elastic.co/logstash/logstash:${ELK_VERSION}
    container_name: logstash
    volumes:
      - ./elk/logstash/pipeline/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
      - ./elk/logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
    ports:
      - "${LOGSTASH_TCP_PORT}:${LOGSTASH_TCP_PORT}"
      - "${LOGSTASH_BEATS_PORT}:${LOGSTASH_BEATS_PORT}"
      - "${API_MONITORING_PORT}:${API_MONITORING_PORT}"
    environment:
      - LS_JAVA_OPTS=-Xms${LS_HEAP} -Xmx${LS_HEAP}
    networks:
      - elk
    depends_on:
      elasticsearch:
        condition: service_healthy
    mem_limit: ${LS_MEM_LIMIT}
    restart: unless-stopped

  # KIBANA
  kibana:
    image: docker.elastic.co/kibana/kibana:${ELK_VERSION}
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:${ES_PORT}
      - SERVER_NAME=kibana
      - KIBANA_SYSTEM_PASSWORD=${KIBANA_PASSWORD}
      - ELASTICSEARCH_HEALTHCHECK_DELAY=20
      - status.allowAnonymous=true   
    ports:
      - "${KIBANA_PORT}:${KIBANA_PORT}"
    networks:
      - elk
    depends_on:
      elasticsearch:
        condition: service_healthy
    mem_limit: ${KIBANA_MEM_LIMIT}
    restart: unless-stopped

networks:
  elk:
    driver: bridge

volumes:
  es-data:
    driver: local